# 可选：在已有 docker-compose.yml 基础上启用 HTTPS
# 用法：
#   将 fullchain.pem / privkey.pem 放到 ./deploy/certs/
#   docker compose -f docker-compose.yml -f docker-compose.https.yml up -d --build

services:
  frontend:
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/certs:/etc/nginx/certs:ro
      - ./deploy/nginx-https.conf:/etc/nginx/conf.d/ssl.conf:ro
